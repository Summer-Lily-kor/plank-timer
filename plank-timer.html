<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="운동기록">
<meta name="theme-color" content="#0d0d0d">
<title>운동 타이머</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #181818; --border: #2a2a2a;
    --text: #f0f0f0; --muted: #666;
    --work: #c8f564; --rest: #64b5f6; --done: #f564a9;
    --squat: #f5a623; --radius: 20px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif; overflow: hidden;
    -webkit-tap-highlight-color: transparent; user-select: none; }

  .screen { display: none; flex-direction: column; height: 100dvh;
    padding: env(safe-area-inset-top,12px) 0 env(safe-area-inset-bottom,12px); }
  .screen.active { display: flex; }

  /* NAV */
  nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    background: var(--surface); border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom,0); z-index: 100; }
  nav button { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; color: var(--muted);
    padding: 12px 0 10px; font-size: 10px; letter-spacing: .05em; cursor: pointer; transition: color .15s; }
  nav button.active { color: var(--work); }
  nav button svg { width: 22px; height: 22px; }

  /* TIMER SCREEN */
  #timer-screen { align-items: center; justify-content: space-between;
    padding-top: calc(env(safe-area-inset-top,12px) + 24px);
    padding-bottom: calc(env(safe-area-inset-bottom,12px) + 72px);
    padding-left: 24px; padding-right: 24px; }
  .phase-label { font-size: 13px; font-weight: 600; letter-spacing: .15em; text-transform: uppercase;
    color: var(--muted); transition: color .3s; }
  .phase-label.work { color: var(--work); }
  .phase-label.rest { color: var(--rest); }
  .phase-label.done { color: var(--done); }
  .ring-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
  .ring-svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); }
  .ring-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset .95s linear, stroke .3s; }
  .ring-content { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .countdown { font-family: 'DM Mono', monospace; font-size: clamp(64px,20vw,96px); font-weight: 500;
    line-height: 1; letter-spacing: -.03em; color: var(--text); transition: color .3s; }
  .countdown.work { color: var(--work); }
  .countdown.rest { color: var(--rest); }
  .countdown.done { color: var(--done); }
  .set-indicator { display: flex; gap: 8px; margin-top: 4px; }
  .set-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background .3s, transform .2s; }
  .set-dot.done-dot { background: var(--work); transform: scale(1.1); }
  .set-dot.current { background: var(--work); opacity: .5; }
  .set-text { font-size: 13px; color: var(--muted); margin-top: 8px; letter-spacing: .04em; }
  .btn-row { display: flex; gap: 16px; width: 100%; }
  .btn { flex: 1; height: 60px; border: none; border-radius: var(--radius);
    font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: transform .1s, opacity .1s; letter-spacing: .02em; }
  .btn:active { transform: scale(.96); opacity: .85; }
  .btn-primary { background: var(--work); color: #0d0d0d; }
  .btn-primary.rest-mode { background: var(--rest); }
  .btn-secondary { background: var(--surface); color: var(--muted); border: 1px solid var(--border); flex: 0 0 60px; }

  /* INLINE CONFIG */
  .inline-config { width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 4px; transition: opacity .2s, transform .2s; }
  .inline-config.hidden { opacity: 0; pointer-events: none; transform: translateY(6px); }
  .inline-row { display: flex; align-items: center; justify-content: space-around; }
  .inline-item { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; min-width: 0; }
  .inline-label { font-size: 10px; font-weight: 600; letter-spacing: .06em; color: var(--muted); text-transform: uppercase; }
  .inline-unit { font-size: 10px; color: var(--muted); }
  .inline-divider { width: 1px; height: 40px; background: var(--border); flex-shrink: 0; }
  .inline-config .stepper { display: flex; align-items: center; width: 100%; justify-content: center; }
  .inline-config .stepper button { width: clamp(24px,7vw,32px); height: clamp(24px,7vw,32px);
    border-radius: 7px; background: var(--border); border: none; color: var(--text);
    font-size: clamp(14px,4vw,18px); line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .inline-config .stepper button:active { background: #333; }
  .inline-config .stepper span { font-family: 'DM Mono', monospace;
    font-size: clamp(13px,4vw,17px); font-weight: 500; min-width: clamp(28px,8vw,40px); text-align: center; }

  /* SQUAT SCREEN */
  #squat-screen { align-items: center; justify-content: center; gap: 32px;
    padding-top: calc(env(safe-area-inset-top,12px) + 24px);
    padding-bottom: calc(env(safe-area-inset-bottom,12px) + 72px);
    padding-left: 24px; padding-right: 24px; }
  .squat-title { font-size: 13px; font-weight: 600; letter-spacing: .15em; text-transform: uppercase; color: var(--squat); }
  .squat-btn { width: 200px; height: 200px; border-radius: 50%; border: none;
    background: var(--squat); color: #0d0d0d; font-family: 'Inter', sans-serif;
    font-size: 20px; font-weight: 700; cursor: pointer; transition: transform .1s, opacity .1s;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .squat-btn:active { transform: scale(.94); opacity: .85; }
  .squat-btn .squat-icon { font-size: 40px; }
  .squat-today { font-size: 14px; color: var(--muted); text-align: center; }
  .squat-today span { color: var(--squat); font-weight: 700; }

  /* CALENDAR SCREEN */
  #calendar-screen { padding-top: calc(env(safe-area-inset-top,12px) + 20px);
    padding-bottom: calc(env(safe-area-inset-bottom,12px) + 72px); overflow-y: auto; }
  .screen-title { font-size: 22px; font-weight: 700; padding: 0 24px 16px; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 24px 16px; }
  .cal-month { font-size: 16px; font-weight: 600; }
  .cal-arrow { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px 8px; }
  .cal-grid { padding: 0 16px; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 8px; }
  .cal-wd { text-align: center; font-size: 11px; font-weight: 600; color: var(--muted); padding: 4px 0; }
  .cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; border-radius: 10px; position: relative; cursor: default; }
  .cal-day .day-num { font-size: 13px; font-weight: 500; }
  .cal-day.empty { opacity: 0; }
  .cal-day.today { background: var(--surface); }
  .cal-day.today .day-num { color: var(--work); font-weight: 700; }
  .cal-dots { display: flex; gap: 3px; margin-top: 3px; }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
  .cal-dot.plank { background: var(--work); }
  .cal-dot.squat { background: var(--squat); }

  /* LEGEND */
  .cal-legend { display: flex; gap: 16px; padding: 16px 24px 0; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* SETTINGS */
  #settings-screen { padding-top: calc(env(safe-area-inset-top,12px) + 20px);
    padding-bottom: calc(env(safe-area-inset-bottom,12px) + 72px); overflow-y: auto; }
  .settings-body { padding: 0 24px; display: flex; flex-direction: column; gap: 12px; }
  .setting-group { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; }
  .setting-row { display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .setting-row label { font-size: 15px; font-weight: 500; }
  .setting-row .hint { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .stepper { display: flex; align-items: center; gap: 0; }
  .stepper button { width: 36px; height: 36px; border-radius: 10px; background: var(--border);
    border: none; color: var(--text); font-size: 20px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background .1s; }
  .stepper button:active { background: #333; }
  .stepper span { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500;
    min-width: 48px; text-align: center; }
  .save-btn { margin-top: 4px; width: 100%; height: 56px; border: none; border-radius: var(--radius);
    background: var(--work); color: #0d0d0d; font-family: 'Inter', sans-serif;
    font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .1s; }
  .save-btn:active { opacity: .8; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: .1em;
    color: var(--muted); text-transform: uppercase; padding: 0 4px; margin-top: 4px; }

  /* DONE OVERLAY */
  #done-overlay { display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(13,13,13,.95); flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  #done-overlay.show { display: flex; }
  .done-emoji { font-size: 64px; animation: pop .4s ease; }
  .done-title { font-size: 28px; font-weight: 700; color: var(--work); }
  .done-sub { font-size: 15px; color: var(--muted); }
  .done-btn { margin-top: 12px; height: 56px; padding: 0 40px; border: none; border-radius: var(--radius);
    background: var(--work); color: #0d0d0d; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; }
  @keyframes pop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* SQUAT DONE OVERLAY */
  #squat-overlay { display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(13,13,13,.95); flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  #squat-overlay.show { display: flex; }
  #squat-overlay .done-title { color: var(--squat); }
  #squat-overlay .done-btn { background: var(--squat); }


  /* RUNNING SCREEN */
  #running-screen { padding-top: calc(env(safe-area-inset-top,12px) + 20px);
    padding-bottom: calc(env(safe-area-inset-bottom,12px) + 72px);
    padding-left: 24px; padding-right: 24px; overflow-y: auto; }
  .run-title { font-size: 13px; font-weight: 600; letter-spacing: .15em;
    text-transform: uppercase; color: #64f5a6; margin-bottom: 24px; }
  .run-form { display: flex; flex-direction: column; gap: 12px; }
  .run-field { background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px 20px; display: flex; flex-direction: column; gap: 6px; }
  .run-field label { font-size: 11px; font-weight: 600; letter-spacing: .08em;
    color: var(--muted); text-transform: uppercase; }
  .run-input { background: none; border: none; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500;
    width: 100%; outline: none; }
  .run-input::placeholder { color: var(--border); }
  .run-input-row { display: flex; align-items: center; gap: 8px; }
  .run-unit { font-size: 14px; color: var(--muted); }
  .run-pace { font-size: 13px; color: #64f5a6; margin-top: 2px; }
  .feel-row { display: flex; gap: 8px; }
  .feel-btn { flex: 1; height: 44px; width: 60px; border: 1px solid var(--border); border-radius: 12px;
    background: none; color: var(--muted); font-size: 20px; cursor: pointer; transition: all .15s; }
  .feel-btn.selected { border-color: #64f5a6; background: rgba(100,245,166,.1); }
  .run-save { width: 100%; height: 56px; border: none; border-radius: var(--radius);
    background: #64f5a6; color: #0d0d0d; font-family: 'Inter', sans-serif;
    font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: opacity .1s; }
  .run-save:active { opacity: .8; }
  ::-webkit-scrollbar { width: 0; }
</style>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/plank-timer/sw.js')
      .then(reg => {
        // 새 버전 있으면 자동 업데이트
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage({ action: 'skipWaiting' });
              window.location.reload();
            }
          });
        });
      });
  });
}
</script>
</head>
<body>

<!-- TIMER SCREEN -->
<div id="timer-screen" class="screen active">
  <div class="phase-label" id="phase-label">준비</div>
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 260 260" width="260" height="260">
      <circle class="ring-bg" cx="130" cy="130" r="116" stroke-width="12"/>
      <circle class="ring-fill" id="ring-fill" cx="130" cy="130" r="116" stroke-width="12"
              stroke="var(--work)" stroke-dasharray="729" stroke-dashoffset="0"/>
    </svg>
    <div class="ring-content">
      <div class="countdown" id="countdown">—</div>
      <div class="set-text" id="set-text">시작을 눌러주세요</div>
      <div class="set-indicator" id="set-indicator"></div>
    </div>
  </div>
  <div class="inline-config" id="inline-config">
    <div class="inline-row">
      <div class="inline-item">
        <div class="inline-label">운동</div>
        <div class="stepper">
          <button onclick="adjustInline('work',-1)">−</button>
          <span id="inline-work">10</span>
          <button onclick="adjustInline('work',1)">+</button>
        </div>
        <div class="inline-unit">초</div>
      </div>
      <div class="inline-divider"></div>
      <div class="inline-item">
        <div class="inline-label">휴식</div>
        <div class="stepper">
          <button onclick="adjustInline('rest',-1)">−</button>
          <span id="inline-rest">5</span>
          <button onclick="adjustInline('rest',1)">+</button>
        </div>
        <div class="inline-unit">초</div>
      </div>
      <div class="inline-divider"></div>
      <div class="inline-item">
        <div class="inline-label">세트</div>
        <div class="stepper">
          <button onclick="adjustInline('sets',-1)">−</button>
          <span id="inline-sets">5</span>
          <button onclick="adjustInline('sets',1)">+</button>
        </div>
        <div class="inline-unit">세트</div>
      </div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="resetTimer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
    </button>
    <button class="btn btn-primary" id="start-btn" onclick="toggleTimer()">시작</button>
  </div>
</div>

<!-- SQUAT SCREEN -->
<div id="squat-screen" class="screen">
  <div class="squat-title">스쿼트</div>
  <button class="squat-btn" onclick="logSquat()">
    <div class="squat-icon">🏋️</div>
    <div>완료!</div>
  </button>
  <div class="squat-today" id="squat-today">오늘 아직 안 했어요</div>
</div>


<!-- RUNNING SCREEN -->
<div id="running-screen" class="screen">
  <div class="run-title">러닝 기록</div>
  <div class="run-form">
    <div class="run-field">
      <label>거리</label>
      <div class="run-input-row">
        <input class="run-input" id="run-dist" type="number" step="0.01" placeholder="0.00" oninput="calcPace()">
        <span class="run-unit">km</span>
      </div>
    </div>
    <div class="run-field">
      <label>시간</label>
      <div class="run-input-row">
        <input class="run-input" id="run-min" type="number" placeholder="00" style="width:60px" oninput="calcPace()">
        <span class="run-unit">분</span>
        <input class="run-input" id="run-sec" type="number" placeholder="00" style="width:60px" oninput="calcPace()">
        <span class="run-unit">초</span>
      </div>
      <div class="run-pace" id="run-pace"></div>
    </div>
    <div class="run-field">
      <label>컨디션</label>
      <div class="feel-row">
        <button class="feel-btn" id="feel-good" onclick="selectFeel('good')">😊</button>
        <button class="feel-btn" id="feel-ok" onclick="selectFeel('ok')">😐</button>
        <button class="feel-btn" id="feel-bad" onclick="selectFeel('bad')">😓</button>
      </div>
    </div>
    <button class="run-save" onclick="saveRun()">기록 저장</button>
  </div>
</div>

<!-- CALENDAR SCREEN -->
<div id="calendar-screen" class="screen">
  <div class="screen-title">달력</div>
  <div class="cal-nav">
    <button class="cal-arrow" onclick="changeMonth(-1)">‹</button>
    <div class="cal-month" id="cal-month"></div>
    <button class="cal-arrow" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--work)"></div>플랭크</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--squat)"></div>스쿼트</div>
    <div class="legend-item"><div class="legend-dot" style="background:#64f5a6"></div>러닝</div>
  </div>
  <div class="cal-grid">
    <div class="cal-weekdays">
      <div class="cal-wd">일</div><div class="cal-wd">월</div><div class="cal-wd">화</div>
      <div class="cal-wd">수</div><div class="cal-wd">목</div><div class="cal-wd">금</div><div class="cal-wd">토</div>
    </div>
    <div class="cal-days" id="cal-days"></div>
  </div>
</div>

<!-- SETTINGS SCREEN -->
<div id="settings-screen" class="screen">
  <div class="screen-title">설정</div>
  <div class="settings-body">
    <div class="section-label">플랭크 타이머</div>
    <div class="setting-group">
      <div class="setting-row">
        <div><label>운동 시간</label><div class="hint">초 단위</div></div>
        <div class="stepper">
          <button onclick="adjust('work',-1)">−</button>
          <span id="val-work">10</span>
          <button onclick="adjust('work',1)">+</button>
        </div>
      </div>
      <div class="setting-row">
        <div><label>휴식 시간</label><div class="hint">초 단위</div></div>
        <div class="stepper">
          <button onclick="adjust('rest',-1)">−</button>
          <span id="val-rest">5</span>
          <button onclick="adjust('rest',1)">+</button>
        </div>
      </div>
      <div class="setting-row">
        <div><label>세트 수</label></div>
        <div class="stepper">
          <button onclick="adjust('sets',-1)">−</button>
          <span id="val-sets">5</span>
          <button onclick="adjust('sets',1)">+</button>
        </div>
      </div>
    </div>
    <button class="save-btn" onclick="saveSettings()">저장하기</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav>
  <button class="active" id="nav-timer" onclick="showScreen('timer')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    플랭크
  </button>
  <button id="nav-squat" onclick="showScreen('squat')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    스쿼트
  </button>
  <button id="nav-running" onclick="showScreen('running')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4a1 1 0 1 0 2 0 1 1 0 0 0-2 0"/><path d="M7.5 17l2-7 3.5 3 3-4.5"/><path d="M17 17l-2-4-2 1"/></svg>
    러닝
  </button>
  <button id="nav-calendar" onclick="showScreen('calendar')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    달력
  </button>
  <button id="nav-settings" onclick="showScreen('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    설정
  </button>
</nav>

<!-- PLANK DONE OVERLAY -->
<div id="done-overlay">
  <div class="done-emoji">🎉</div>
  <div class="done-title">완료!</div>
  <div class="done-sub" id="done-sub"></div>
  <div style="display:flex;gap:12px;margin:8px 0;">
    <button class="feel-btn" id="plank-feel-good" onclick="selectPlankFeel('good')">😊</button>
    <button class="feel-btn" id="plank-feel-ok" onclick="selectPlankFeel('ok')">😐</button>
    <button class="feel-btn" id="plank-feel-bad" onclick="selectPlankFeel('bad')">😓</button>
  </div>
  <button class="done-btn" onclick="closeDone()">확인</button>
</div>

<!-- SQUAT DONE OVERLAY -->
<div id="squat-overlay">
  <div class="done-emoji">💪</div>
  <div class="done-title" style="color:var(--squat)">스쿼트 완료!</div>
  <div class="done-sub">오늘도 수고했어요 🙌</div>
  <div style="display:flex;gap:12px;margin:8px 0;">
    <button class="feel-btn" id="squat-feel-good" onclick="selectSquatFeel('good')">😊</button>
    <button class="feel-btn" id="squat-feel-ok" onclick="selectSquatFeel('ok')">😐</button>
    <button class="feel-btn" id="squat-feel-bad" onclick="selectSquatFeel('bad')">😓</button>
  </div>
  <button class="done-btn" style="background:var(--squat)" onclick="closeSquatDone()">확인</button>
</div>

<script>
const STORAGE_KEY = 'plank_sessions';
const SQUAT_KEY   = 'squat_sessions';
const SETTINGS_KEY = 'plank_settings';
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzf1UINdzelETldZ1T26V_tqA_WtKg8IU5ExChyeujEGtuBKvKPL6nIWxwladAEiqUA/exec';

let cfg = { work: 10, rest: 5, sets: 5 };
let tmpCfg = { ...cfg };
let phase = 'idle';
let currentSet = 0, timeLeft = 0, totalSeconds = 0;
let tickInterval = null;
let calYear, calMonth;

// ── INIT ──
function init() {
  const saved = localStorage.getItem(SETTINGS_KEY);
  if (saved) cfg = JSON.parse(saved);
  tmpCfg = { ...cfg };
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  syncSettingsUI(); syncInlineUI(); buildDots(); updateCountdownDisplay();
}

// ── SCREEN NAV ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(name + '-screen').classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'calendar') renderCalendar();
  if (name === 'squat') updateSquatToday();
}

// ── TIMER ──
function toggleTimer() {
  try { getAudioCtx().resume(); } catch(e) {}
  if (phase === 'idle' || phase === 'done') startSession();
  else if (tickInterval) pauseTimer();
  else resumeTimer();
}
function startSession() {
  currentSet = 0; totalSeconds = 0;
  document.getElementById('inline-config').classList.add('hidden');
  beginWork();
}
function beginWork() {
  currentSet++; phase = 'work'; timeLeft = cfg.work;
  updateUI(); beepPhaseChange(); startTick();
}
function beginRest() {
  phase = 'rest'; timeLeft = cfg.rest;
  updateUI(); vibrate([60]); beepPhaseChange(); startTick();
}
function finishSession() {
  clearInterval(tickInterval); tickInterval = null; phase = 'done';
  savePlankSession({ sets: cfg.sets, totalSec: totalSeconds, complete: true });
  saveToSheet({ type: 'plank', sets: cfg.sets, totalSec: totalSeconds, feel: plankFeel });
  updateUI(); beepDone(); showDone();
}
function startTick() {
  clearInterval(tickInterval);
  tickInterval = setInterval(() => {
    totalSeconds++; timeLeft--; updateRing();
    if (timeLeft > 0 && timeLeft <= 3) beepTick();
    if (timeLeft <= 0) {
      if (phase === 'work') { currentSet >= cfg.sets ? finishSession() : beginRest(); }
      else if (phase === 'rest') beginWork();
    }
    updateCountdownDisplay();
  }, 1000);
}
function pauseTimer() { clearInterval(tickInterval); tickInterval = null; document.getElementById('start-btn').textContent = '계속'; }
function resumeTimer() { startTick(); document.getElementById('start-btn').textContent = '일시정지'; }
function resetTimer() {
  clearInterval(tickInterval); tickInterval = null;
  phase = 'idle'; currentSet = 0; timeLeft = 0; totalSeconds = 0;
  document.getElementById('inline-config').classList.remove('hidden');
  updateUI();
}

// ── TIMER UI ──
const CIRC = 2 * Math.PI * 116;
function updateUI() {
  const el = document.getElementById('countdown');
  const lbl = document.getElementById('phase-label');
  const btn = document.getElementById('start-btn');
  const rf = document.getElementById('ring-fill');
  const labels = { idle:'준비', work:'운동 중', rest:'휴식', done:'완료' };
  lbl.textContent = labels[phase];
  lbl.className = 'phase-label ' + (phase==='idle'?'':phase==='done'?'done':phase);
  el.className = 'countdown ' + (phase==='idle'?'':phase==='done'?'done':phase);
  const colors = { idle:'var(--border)', work:'var(--work)', rest:'var(--rest)', done:'var(--done)' };
  rf.style.stroke = colors[phase];
  if (phase==='idle') { btn.textContent='시작'; btn.className='btn btn-primary'; }
  else if (phase==='done') { btn.textContent='다시 하기'; btn.className='btn btn-primary'; }
  else if (tickInterval) { btn.textContent='일시정지'; btn.className='btn btn-primary'+(phase==='rest'?' rest-mode':''); }
  else { btn.textContent='계속'; btn.className='btn btn-primary'; }
  updateCountdownDisplay(); updateDots(); updateRing();
  const st = document.getElementById('set-text');
  if (phase==='idle') st.textContent='시작을 눌러주세요';
  else if (phase==='done') st.textContent=`${cfg.sets}세트 완료!`;
  else st.textContent=`${currentSet} / ${cfg.sets} 세트`;
}
function updateCountdownDisplay() {
  const el = document.getElementById('countdown');
  if (phase==='idle') { el.textContent=cfg.work; return; }
  if (phase==='done') { el.textContent='✓'; return; }
  el.textContent = timeLeft;
}
function updateRing() {
  const fill = document.getElementById('ring-fill');
  if (phase==='idle'||phase==='done') { fill.style.strokeDashoffset=0; return; }
  const total = phase==='work' ? cfg.work : cfg.rest;
  fill.style.strokeDashoffset = CIRC * (1 - timeLeft/total);
}
function buildDots() {
  const wrap = document.getElementById('set-indicator'); wrap.innerHTML='';
  for (let i=0; i<cfg.sets; i++) {
    const d = document.createElement('div'); d.className='set-dot'; d.id='dot-'+i; wrap.appendChild(d);
  }
}
function updateDots() {
  for (let i=0; i<cfg.sets; i++) {
    const d = document.getElementById('dot-'+i); if (!d) continue;
    if (i<currentSet-1||phase==='done') d.className='set-dot done-dot';
    else if (i===currentSet-1) d.className='set-dot current';
    else d.className='set-dot';
  }
}

// ── PLANK DONE ──
function showDone() {
  const sub = document.getElementById('done-sub');
  const mins = Math.floor(totalSeconds/60), secs = totalSeconds%60;
  sub.textContent = `${cfg.sets}세트 · 총 ${mins>0?mins+'분 '+secs+'초':secs+'초'}`;
  document.getElementById('done-overlay').classList.add('show');
  vibrate([80,60,80,60,200]);
}
function closeDone() {
  document.getElementById('done-overlay').classList.remove('show');
  plankFeel = null;
  ['good','ok','bad'].forEach(f => document.getElementById('plank-feel-'+f).classList.remove('selected'));
  resetTimer();
}

// ── SQUAT ──
function logSquat() {
  try { getAudioCtx().resume(); } catch(e) {}
  const sessions = JSON.parse(localStorage.getItem(SQUAT_KEY)||'[]');
  sessions.unshift({ date: new Date().toISOString() });
  localStorage.setItem(SQUAT_KEY, JSON.stringify(sessions));
  saveToSheet({ type: 'squat', feel: squatFeel });
  vibrate([80,60,200]);
  beepDone();
  document.getElementById('squat-overlay').classList.add('show');
  updateSquatToday();
}
function closeSquatDone() {
  document.getElementById('squat-overlay').classList.remove('show');
  squatFeel = null;
  ['good','ok','bad'].forEach(f => document.getElementById('squat-feel-'+f).classList.remove('selected'));
}
function updateSquatToday() {
  const sessions = JSON.parse(localStorage.getItem(SQUAT_KEY)||'[]');
  const todayStr = todayKey();
  const todayCount = sessions.filter(s => s.date.startsWith(todayStr.replace(/\./g,'-'))||dateKey(new Date(s.date))===todayStr).length;
  const el = document.getElementById('squat-today');
  if (todayCount===0) el.innerHTML='오늘 아직 안 했어요';
  else el.innerHTML=`오늘 <span>${todayCount}회</span> 완료 🔥`;
}

// ── CALENDAR ──
function todayKey() {
  const n=new Date(); return `${n.getFullYear()}.${String(n.getMonth()+1).padStart(2,'0')}.${String(n.getDate()).padStart(2,'0')}`;
}
function dateKey(d) {
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function changeMonth(delta) { calMonth+=delta; if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function renderCalendar() {
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month').textContent=`${calYear}년 ${monthNames[calMonth]}`;

  // build sets of dates with exercises
  const plankSessions = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  const squatSessions = JSON.parse(localStorage.getItem(SQUAT_KEY)||'[]');
  const runSessions = JSON.parse(localStorage.getItem(RUN_KEY)||'[]');
  const plankDays = new Set(plankSessions.map(s=>dateKey(new Date(s.date))));
  const squatDays = new Set(squatSessions.map(s=>dateKey(new Date(s.date))));
  const runDays = new Set(runSessions.map(s=>dateKey(new Date(s.date))));

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today = todayKey();

  const grid = document.getElementById('cal-days'); grid.innerHTML='';

  for (let i=0; i<firstDay; i++) {
    const empty=document.createElement('div'); empty.className='cal-day empty'; grid.appendChild(empty);
  }
  for (let d=1; d<=daysInMonth; d++) {
    const key=`${calYear}.${String(calMonth+1).padStart(2,'0')}.${String(d).padStart(2,'0')}`;
    const cell=document.createElement('div');
    cell.className='cal-day'+(key===today?' today':'');
    const hasPlank=plankDays.has(key), hasSquat=squatDays.has(key), hasRun=runDays.has(key);
    let dotsHTML='';
    if (hasPlank||hasSquat||hasRun) {
      dotsHTML='<div class="cal-dots">';
      if (hasPlank) dotsHTML+='<div class="cal-dot plank"></div>';
      if (hasSquat) dotsHTML+='<div class="cal-dot squat"></div>';
      if (hasRun) dotsHTML+='<div class="cal-dot" style="background:#64f5a6"></div>';
      dotsHTML+='</div>';
    }
    cell.innerHTML=`<div class="day-num">${d}</div>${dotsHTML}`;
    grid.appendChild(cell);
  }
}

// ── SOUND ──
let audioCtx=null;
function getAudioCtx() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function beep(freq=880,duration=0.12,vol=0.4) {
  try {
    const ctx=getAudioCtx(), osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type='sine'; osc.frequency.setValueAtTime(freq,ctx.currentTime);
    gain.gain.setValueAtTime(vol,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+duration);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+duration);
  } catch(e) {}
}
function beepPhaseChange() { beep(880,0.1); setTimeout(()=>beep(880,0.1),150); }
function beepDone() { beep(660,0.12); setTimeout(()=>beep(880,0.12),160); setTimeout(()=>beep(1100,0.25),320); }
function beepTick() { beep(440,0.08,0.25); }
function vibrate(p) { if(navigator.vibrate) navigator.vibrate(p); }

// ── SETTINGS ──
function adjust(key,delta) {
  const mins={work:1,rest:1,sets:1}, maxs={work:300,rest:120,sets:20};
  tmpCfg[key]=Math.max(mins[key],Math.min(maxs[key],tmpCfg[key]+delta));
  document.getElementById('val-'+key).textContent=tmpCfg[key];
}
function syncSettingsUI() {
  tmpCfg={...cfg};
  ['work','rest','sets'].forEach(k=>document.getElementById('val-'+k).textContent=cfg[k]);
}
function saveSettings() {
  cfg={...tmpCfg}; localStorage.setItem(SETTINGS_KEY,JSON.stringify(cfg));
  if(phase==='idle'){buildDots();updateCountdownDisplay();}
  const btn=document.querySelector('.save-btn');
  btn.textContent='저장됐어요 ✓'; setTimeout(()=>btn.textContent='저장하기',1500);
}
function adjustInline(key,delta) {
  const mins={work:1,rest:1,sets:1}, maxs={work:300,rest:120,sets:20};
  cfg[key]=Math.max(mins[key],Math.min(maxs[key],cfg[key]+delta));
  document.getElementById('inline-'+key).textContent=cfg[key];
  document.getElementById('val-'+key).textContent=cfg[key];
  tmpCfg={...cfg}; localStorage.setItem(SETTINGS_KEY,JSON.stringify(cfg));
  buildDots(); updateCountdownDisplay();
}
function syncInlineUI() {
  ['work','rest','sets'].forEach(k=>{ const el=document.getElementById('inline-'+k); if(el) el.textContent=cfg[k]; });
}


// ── FEEL FOR PLANK/SQUAT ──
let plankFeel = null, squatFeel = null;

function selectPlankFeel(feel) {
  plankFeel = feel;
  ['good','ok','bad'].forEach(f => document.getElementById('plank-feel-'+f).classList.remove('selected'));
  document.getElementById('plank-feel-'+feel).classList.add('selected');
}
function selectSquatFeel(feel) {
  squatFeel = feel;
  ['good','ok','bad'].forEach(f => document.getElementById('squat-feel-'+f).classList.remove('selected'));
  document.getElementById('squat-feel-'+feel).classList.add('selected');
}

// ── RUNNING ──
const RUN_KEY = 'run_sessions';
let selectedFeel = null;

function selectFeel(feel) {
  selectedFeel = feel;
  ['good','ok','bad'].forEach(f => document.getElementById('feel-'+f).classList.remove('selected'));
  document.getElementById('feel-'+feel).classList.add('selected');
}

function calcPace() {
  const dist = parseFloat(document.getElementById('run-dist').value);
  const min = parseInt(document.getElementById('run-min').value)||0;
  const sec = parseInt(document.getElementById('run-sec').value)||0;
  const totalMin = min + sec/60;
  const el = document.getElementById('run-pace');
  if (dist > 0 && totalMin > 0) {
    const pace = totalMin / dist;
    const pm = Math.floor(pace);
    const ps = Math.round((pace - pm) * 60);
    el.textContent = `페이스 ${pm}'${String(ps).padStart(2,'0')}" /km`;
  } else {
    el.textContent = '';
  }
}

function saveRun() {
  const dist = parseFloat(document.getElementById('run-dist').value);
  const min = parseInt(document.getElementById('run-min').value)||0;
  const sec = parseInt(document.getElementById('run-sec').value)||0;
  if (!dist || (min===0 && sec===0)) {
    alert('거리와 시간을 입력해줘요!'); return;
  }
  const totalSec = min*60 + sec;
  const pace = (min + sec/60) / dist;
  const pm = Math.floor(pace), ps = Math.round((pace-pm)*60);
  const session = {
    date: new Date().toISOString(),
    dist, totalSec,
    pace: `${pm}'${String(ps).padStart(2,'0')}"`,
    feel: selectedFeel
  };
  const sessions = JSON.parse(localStorage.getItem(RUN_KEY)||'[]');
  sessions.unshift(session);
  localStorage.setItem(RUN_KEY, JSON.stringify(sessions));
  saveToSheet({ type:'running', dist, totalSec, pace: session.pace, feel: selectedFeel });

  // 초기화
  document.getElementById('run-dist').value='';
  document.getElementById('run-min').value='';
  document.getElementById('run-sec').value='';
  document.getElementById('run-pace').textContent='';
  selectedFeel=null;
  ['good','ok','bad'].forEach(f=>document.getElementById('feel-'+f).classList.remove('selected'));

  // 완료 피드백
  beepDone(); vibrate([80,60,200]);
  const btn = document.querySelector('.run-save');
  btn.textContent='저장됐어요 🏃‍♀️';
  setTimeout(()=>btn.textContent='기록 저장', 2000);
}

// ── STORAGE ──
function savePlankSession(data) {
  const sessions=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  sessions.unshift({ date:new Date().toISOString(), sets:data.sets, totalSec:data.totalSec, complete:data.complete, workTime:cfg.work, restTime:cfg.rest });
  localStorage.setItem(STORAGE_KEY,JSON.stringify(sessions));
}

// ── GOOGLE SHEETS ──
async function saveToSheet(data) {
  try {
    const now=new Date();
    const date=dateKey(now);
    const time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const payload = { type:data.type, date, time, sets:data.sets||null,
      workTime:data.type==='plank'?cfg.work:null, restTime:data.type==='plank'?cfg.rest:null,
      totalSec:data.totalSec||null, feel:data.feel||null, dist:data.dist||null, pace:data.pace||null };
    // URL에 파라미터로 전송 (GET 방식 - 재시도 없음)
    const url = SHEET_URL + '?payload=' + encodeURIComponent(JSON.stringify(payload));
    const img = new Image();
    img.src = url;
  } catch(e) {}
}

init();
</script>
</body>
